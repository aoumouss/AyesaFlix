# --- Base de datos H2 en memoria ---
  spring.datasource.url=jdbc:h2:mem:ayesaflixdb
  spring.datasource.driverClassName=org.h2.Driver
  spring.datasource.username=sa
  spring.datasource.password=

  # Consola visual H2 (http://localhost:8080/h2-console)
  spring.h2.console.enabled=true
  spring.h2.console.path=/h2-console

  # --- JPA / Hibernate ---
  # update = crea/actualiza tablas automaticamente a partir de las entidades Java
  spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
  spring.jpa.hibernate.ddl-auto=update
  # Muestra en consola el SQL que ejecuta Hibernate
  spring.jpa.show-sql=true
  # Desactiva la sesion abierta en cada peticion HTTP
  spring.jpa.open-in-view=false

  # Formatea el JSON con sangria para que sea legible en el navegador
  spring.jackson.serialization.indent-output=true
  spring.messages.encoding=UTF-8

  # data.sql debe ejecutarse DESPUES de que JPA haya creado las tablas
  spring.sql.init.mode=always
  spring.jpa.defer-datasource-initialization=true