<!DOCTYPE html>
  <html lang="es">

  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AyesaFlix — Nueva Película</title>
      <link rel="icon" type="image/png" href="../favicon.ico">
      <link href="../css - bootstrap/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

      <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
              background-color: #c9d4e0;
              font-family: sans-serif;
              min-height: 100vh;
          }

          header {
              background-color: #1a2340; color: white;
              padding: 0 30px; display: flex; align-items: center;
              position: sticky; top: 0; z-index: 1000; height: 56px;
          }

          .logo { font-size: 1.25rem; font-weight: bold; flex-shrink: 0; }

          header nav {
              display: flex; align-items: center; margin-left: 2rem;
          }
          nav ul { list-style: none; display: flex; align-items: center; }
          .menu-principal > li { position: relative; display: flex; align-items: center; }

          .menu-principal > li > a {
              text-decoration: none; color: rgba(255,255,255,0.8);
              padding: 18px 22px; display: flex; align-items: center;
              gap: 8px; font-size: 1.05rem; font-weight: 600;
              box-shadow: inset 0 -2px 0 transparent;
              transition: color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
          }

          .menu-principal > li > a:hover {
              color: #ffffff;
              box-shadow: inset 0 -2px 0 #eb5feb;
              background-color: rgba(255,255,255,0.07);
          }

          .submenu {
              display: none; position: absolute; top: 100%; left: 50%;
              transform: translateX(-50%);
              background-color: #1a2340; min-width: 200px; padding: 6px 0;
              border-radius: 0 0 10px 10px;
              box-shadow: 0 8px 20px rgba(0,0,0,0.35);
              border-top: 2px solid #eb5feb;
          }

          .menu-principal li:hover .submenu { display: block; }

          .submenu li a {
              padding: 10px 18px; display: flex; align-items: center; gap: 8px;
              text-decoration: none; color: rgba(255,255,255,0.75); font-size: 0.875rem;
              transition: background-color 0.15s ease, color 0.15s ease;
          }

          .submenu li a:hover { background-color: #1e2a40; color: #ffffff; }

          .formulario-card {
              background-color: #1e2a40;
              border-radius: 16px;
              padding: 2rem;
              max-width: 650px;
              margin: 3rem auto;
              color: white;
              box-shadow: 0 8px 24px rgba(0,0,0,0.3);
          }

          .formulario-card h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }

          .form-label { color: #adb5bd; font-size: 0.9rem; margin-bottom: 4px; }

          .form-control, .form-select {
              background-color: #1e2a40;
              border: 1px solid #2e3f5c;
              color: white;
              border-radius: 10px;
          }

          .form-control:focus, .form-select:focus {
              background-color: #1e2a40;
              border-color: #0d6efd;
              color: white;
              box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.25);
          }

          .form-select option { background-color: #1e2a40; }

          .check-vista {
              background-color: #16203a;
              border: 1px solid #2e3f5c;
              border-radius: 10px;
              padding: 14px 16px;
              display: flex;
              align-items: center;
              gap: 10px;
          }
          .check-vista .form-check-input {
              background-color: #1e2a40;
              border-color: #2e3f5c;
              width: 1.3em; height: 1.3em;
              margin: 0;
              cursor: pointer;
          }
          .check-vista .form-check-input:checked {
              background-color: #10b981;
              border-color: #10b981;
          }
          .check-vista label { color: #e2e8f0; font-size: 0.95rem; cursor: pointer; margin: 0; }

          .btn-guardar {
              background-color: #0d6efd;
              color: white;
              border: none;
              border-radius: 10px;
              padding: 10px 30px;
              font-size: 1rem;
              cursor: pointer;
              transition: background-color 0.2s;
          }

          .btn-guardar:hover { background-color: #0b5ed7; }

          .btn-cancelar {
              background-color: transparent;
              color: #adb5bd;
              border: 1px solid #2e3f5c;
              border-radius: 10px;
              padding: 10px 30px;
              font-size: 1rem;
              cursor: pointer;
              text-decoration: none;
              transition: all 0.2s;
          }

          .btn-cancelar:hover { color: white; border-color: white; }

          #mensaje {
              display: none;
              border-radius: 10px;
              padding: 12px 16px;
              margin-bottom: 1rem;
              font-size: 0.9rem;
          }

          .mensaje-ok { background-color: #0f5132; color: #d1e7dd; }
          .mensaje-error { background-color: #842029; color: #f8d7da; }

          footer {
              background-color: #1a2340;
              color: #e2e8f0;
              text-align: center;
              padding: 10px;
              font-size: 0.85rem;
              position: fixed;
              bottom: 0;
              width: 100%;
          }
      </style>
  </head>

  <body>
      <div id="header-container"></div>

      <div class="container">
          <div class="formulario-card">
              <h2><i class="bi bi-film me-2"></i>Nueva Película</h2>

              <div id="mensaje"></div>

              <form id="form-nueva-pelicula">
                  <div class="mb-3">
                      <label class="form-label">Título *</label>
                      <input type="text" id="titulo" class="form-control" placeholder="Ej: Interstellar" required>
                  </div>

                  <div class="row mb-3">
                      <div class="col-md-6">
                          <label class="form-label">Género *</label>
                          <select id="genero" class="form-select" required>
                              <option value="">Selecciona un género</option>
                          </select>
                      </div>
                      <div class="col-md-3">
                          <label class="form-label">Año</label>
                          <input type="number" id="anio" class="form-control" placeholder="2024" min="1888">
                      </div>
                      <div class="col-md-3">
                          <label class="form-label">Duración (min)</label>
                          <input type="number" id="duracion" class="form-control" placeholder="120" min="1">
                      </div>
                  </div>

                  <div class="mb-3">
                      <label class="form-label">Sinopsis</label>
                      <textarea id="sinopsis" class="form-control" rows="3" placeholder="Descripción de la película..."></textarea>
                  </div>

                  <div class="mb-3">
                      <label class="form-label">Actores</label>
                      <input type="text" id="actores" class="form-control" placeholder="Ej: Leonardo DiCaprio, Kate Winslet">
                  </div>

                  <div class="mb-3">
                      <label class="form-label">URL del póster</label>
                      <input type="url" id="urlPortada" class="form-control" placeholder="https://...">
                  </div>

                  <div class="mb-3">
                      <label class="form-label">URL del trailer <span class="text-white-50">(YouTube embed, opcional)</span></label>
                      <input type="url" id="urlTrailer" class="form-control" placeholder="https://www.youtube.com/embed/...">
                  </div>

                  <div class="mb-4">
                      <div class="check-vista">
                          <input class="form-check-input" type="checkbox" id="vista" checked>
                          <label for="vista">
                              <i class="bi bi-eye me-1"></i>Ya la he visto
                              <span class="text-white-50">(desmárcalo para añadirla a la Watchlist como pendiente)</span>
                          </label>
                      </div>
                  </div>

                  <div class="d-flex gap-3">
                      <button type="submit" class="btn-guardar">
                          <i class="bi bi-save me-1"></i> Guardar
                      </button>
                      <a href="../index.html" class="btn-cancelar">Cancelar</a>
                  </div>
              </form>
          </div>
      </div>

      <footer>
          <strong>AyesaFlix 2026 &copy; Todos los derechos reservados</strong>
      </footer>

      <script src="../js - bootstrap/bootstrap.bundle.min.js"></script>
      <script>
          const API = 'http://localhost:8080/api';

          async function cargarGeneros() {
              const res = await fetch(`${API}/generos`);
              const generos = await res.json();
              const select = document.getElementById('genero');
              generos.forEach(g => {
                  const option = document.createElement('option');
                  option.value = g.id;
                  option.textContent = g.nombre;
                  select.appendChild(option);
              });
          }

          function mostrarMensaje(texto, tipo) {
              const el = document.getElementById('mensaje');
              el.textContent = texto;
              el.className = tipo === 'ok' ? 'mensaje-ok' : 'mensaje-error';
              el.style.display = 'block';
              setTimeout(() => { el.style.display = 'none'; }, 4000);
          }

          document.getElementById('form-nueva-pelicula').addEventListener('submit', async (e) => {
              e.preventDefault();

              const generoId = document.getElementById('genero').value;
              if (!generoId) {
                  mostrarMensaje('Selecciona un género.', 'error');
                  return;
              }

              const pelicula = {
                  titulo:     document.getElementById('titulo').value.trim(),
                  anio:       parseInt(document.getElementById('anio').value) || null,
                  duracion:   parseInt(document.getElementById('duracion').value) || null,
                  sinopsis:   document.getElementById('sinopsis').value.trim() || null,
                  actores:    document.getElementById('actores').value.trim() || null,
                  urlPortada: document.getElementById('urlPortada').value.trim() || null,
                  urlTrailer: document.getElementById('urlTrailer').value.trim() || null,
                  favorita:   false,
                  vista:      document.getElementById('vista').checked,
                  genero:     { id: parseInt(generoId) }
              };

              const res = await fetch(`${API}/peliculas`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(pelicula)
              });

              if (res.ok) {
                  mostrarMensaje('Película guardada correctamente.', 'ok');
                  document.getElementById('form-nueva-pelicula').reset();
                  document.getElementById('vista').checked = true;
              } else {
                  const error = await res.json().catch(() => ({}));
                  mostrarMensaje(error.message ?? 'Error al guardar la película.', 'error');
              }
          });

          cargarGeneros();
		  
		  
		  fetch('/peliculas/layout.html')
		                  .then(response => response.text())
		                  .then(data => {
		                          document.getElementById('header-container').innerHTML = data;
		                  })
		                  .catch(error => console.error('Error al cargar la cabecera:', error));
						  
			
      </script>
  </body>

  </html>
