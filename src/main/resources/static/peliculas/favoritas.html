<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyesaFlix — Mis Favoritas</title>
    <link href="../css - bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background-color:#c9d4e0; font-family:sans-serif; min-height:100vh; }
        header { background-color:#1a2340; color:white; padding:0 30px; display:flex; align-items:center; position:sticky; top:0; z-index:1000; height:56px; }
        .logo { font-size:1.25rem; font-weight:bold; flex-shrink:0; }
        header nav { display:flex; align-items:center; margin-left:2rem; }
        nav ul { list-style:none; display:flex; align-items:center; }
        .menu-principal>li { position:relative; display:flex; align-items:center; }
        .menu-principal>li>a { text-decoration:none; color:rgba(255,255,255,0.8); padding:18px 22px; display:flex; align-items:center; gap:8px; font-size:1.05rem; font-weight:600; box-shadow:inset 0 -2px 0 transparent; transition:color .2s, box-shadow .2s, background-color .2s; }
        .menu-principal>li>a:hover { color:#fff; box-shadow:inset 0 -2px 0 #eb5feb; background-color:rgba(255,255,255,0.07); }
        .submenu { display:none; position:absolute; top:100%; left:50%; transform:translateX(-50%); background-color:#1a2340; min-width:200px; padding:6px 0; border-radius:0 0 10px 10px; box-shadow:0 8px 20px rgba(0,0,0,.35); border-top:2px solid #eb5feb; }
        .menu-principal li:hover .submenu { display:block; }
        .submenu li a { padding:10px 18px; display:flex; align-items:center; gap:8px; text-decoration:none; color:rgba(255,255,255,0.75); font-size:.875rem; transition:background-color .15s, color .15s; }
        .submenu li a:hover { background-color:#1e2a40; color:#fff; }
        .contenedor-busqueda { background-color: rgba(18, 24, 41, 0.45); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px !important; backdrop-filter: blur(4px); }
        .contenedor-busqueda .form-control:focus { box-shadow: none; color: #ffffff; }
        .contenedor-busqueda .input-group-text, .contenedor-busqueda .form-control { border-radius: 14px !important; }
        .placeholder-personalizado::placeholder { color: rgba(255, 255, 255, 0.5) !important; opacity: 1; }
        footer { background-color:#1a2340; color:#e2e8f0; text-align:center; padding:10px; font-size:.85rem; position:fixed; bottom:0; width:100%; }
        .tarjeta-fav { background-color:#1e2a40; border-radius:16px; color:white; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.3); }
        .tarjeta-fav img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
        .tarjeta-fav .info { padding:14px; }
        #estado-vacio { display:none; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="container my-5" style="padding-bottom:60px;">
        <h2 class="text-dark mb-4 d-flex align-items-center gap-2">
            <svg width="30" height="30" viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                    <linearGradient id="favGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#eb5feb" />
                        <stop offset="100%" stop-color="#a855f7" />
                    </linearGradient>
                </defs>
                <path d="M12 21l-1.6-1.45C5 14.74 2 11.9 2 8.5 2 5.9 4 4 6.5 4c1.74 0 3.41.9 4.5 2.35C12.09 4.9 13.76 4 15.5 4 18 4 20 5.9 20 8.5c0 3.4-3 6.24-8.4 11.05L12 21z"
                    fill="none" stroke="url(#favGrad)" stroke-width="1.8" stroke-linejoin="round" />
            </svg>
            Mis Favoritas
        </h2>

        <div class="mx-auto mb-4" style="max-width:500px;">
            <div class="input-group contenedor-busqueda shadow-sm">
                <span class="input-group-text bg-transparent border-0 text-white-50 ps-3">
                    <i class="bi bi-search fs-5"></i>
                </span>
                <input type="text" id="input-busqueda-pelicula"
                    class="form-control bg-transparent border-0 text-white placeholder-personalizado py-2"
                    placeholder="Buscar películas" autocomplete="off">
            </div>
        </div>

        <div id="grid-favoritas" class="row row-cols-1 row-cols-md-4 g-4"></div>
        <div id="estado-vacio" class="text-center text-muted py-5">
            <i class="bi bi-heart fs-1 text-danger"></i>
            <p class="mt-2" id="estado-vacio-texto">No tienes películas favoritas todavía.</p>
        </div>
    </div>

    <footer><strong>AyesaFlix 2026 &copy; Todos los derechos reservados</strong></footer>

    <script src="../js - bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:8080/api';

        let favoritas = [];   // lista completa en memoria (para filtrar sin volver a pedir al backend)

        async function cargarFavoritas() {
            const res = await fetch(`${API}/peliculas/favoritas`);
            favoritas = await res.json();
            renderFavoritas(favoritas);
        }

        function renderFavoritas(lista) {
            const grid = document.getElementById('grid-favoritas');
            const vacio = document.getElementById('estado-vacio');
            const vacioTexto = document.getElementById('estado-vacio-texto');

            if (!lista.length) {
                grid.innerHTML = '';
                // Distingue "no hay favoritas" de "sin resultados de búsqueda"
                vacioTexto.textContent = favoritas.length
                    ? 'No hay favoritas que coincidan con tu búsqueda.'
                    : 'No tienes películas favoritas todavía.';
                vacio.style.display = 'block';
                return;
            }

            vacio.style.display = 'none';
            grid.innerHTML = lista.map(p => `
                <div class="col">
                    <div class="tarjeta-fav">
                        <img src="${p.urlPortada ?? 'https://picsum.photos/300/400'}" alt="${p.titulo}">
                        <div class="info">
                            <h6 class="fw-bold mb-1">${p.titulo}</h6>
                            <p class="small mb-2 text-white-50">${p.anio ?? '—'} · ${p.genero?.nombre ?? '—'}</p>
                            <button class="btn btn-sm btn-outline-danger w-100"
                                onclick="quitarFav(${p.id}, this.closest('.col'))">
                                <i class="bi bi-heart-slash me-1"></i>Quitar de Favoritas
                            </button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function filtrarFavoritas() {
            const texto = document.getElementById('input-busqueda-pelicula').value.toLowerCase().trim();
            renderFavoritas(favoritas.filter(p => (p.titulo ?? '').toLowerCase().includes(texto)));
        }

        async function quitarFav(id, tarjetaEl) {
            const res = await fetch(`${API}/peliculas/${id}/favorita`, { method: 'POST' });
            if (res.ok) {
                // Quita la peli de la lista en memoria para que el filtro siga siendo coherente
                favoritas = favoritas.filter(p => p.id !== id);
                tarjetaEl.style.transition = 'opacity 0.3s';
                tarjetaEl.style.opacity = '0';
                setTimeout(() => {
                    tarjetaEl.remove();
                    if (!document.querySelectorAll('#grid-favoritas .col').length)
                        filtrarFavoritas();
                }, 300);
            }
        }

        document.getElementById('input-busqueda-pelicula').addEventListener('input', filtrarFavoritas);

        cargarFavoritas();
		
		fetch('/peliculas/layout.html') 
		                .then(response => response.text())
		                .then(data => {
		                        document.getElementById('header-container').innerHTML = data;
		                })
		                .catch(error => console.error('Error al cargar la cabecera:', error));
    </script>
</body>
</html>
