<!DOCTYPE html>
  <html lang="es">

  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AyesaFlix — Watchlist</title>
      <link rel="icon" type="image/png" href="../favicon.ico">
      <link href="../css - bootstrap/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

      <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }

          body { background-color: #c9d4e0; font-family: sans-serif; min-height: 100vh; }

          header {
              background-color: #1a2340; color: white;
              padding: 0 30px; display: flex; align-items: center;
              position: sticky; top: 0; z-index: 1000; height: 56px;
          }

          .logo { font-size: 1.25rem; font-weight: bold; flex-shrink: 0; }

          header nav { display: flex; align-items: center; margin-left: 2rem; }
          nav ul { list-style: none; display: flex; align-items: center; }
          .menu-principal > li { position: relative; display: flex; align-items: center; }

          .menu-principal > li > a {
              text-decoration: none; color: rgba(255,255,255,0.8);
              padding: 18px 22px; display: flex; align-items: center;
              gap: 8px; font-size: 1.05rem; font-weight: 600;
              box-shadow: inset 0 -2px 0 transparent;
              transition: color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
          }

          .menu-principal > li > a:hover {
              color: #ffffff;
              box-shadow: inset 0 -2px 0 #eb5feb;
              background-color: rgba(255,255,255,0.07);
          }

          .submenu {
              display: none; position: absolute; top: 100%; left: 50%;
              transform: translateX(-50%);
              background-color: #1a2340; min-width: 200px; padding: 6px 0;
              border-radius: 0 0 10px 10px;
              box-shadow: 0 8px 20px rgba(0,0,0,0.35);
              border-top: 2px solid #eb5feb;
          }

          .menu-principal li:hover .submenu { display: block; }

          .submenu li a {
              padding: 10px 18px; display: flex; align-items: center; gap: 8px;
              text-decoration: none; color: rgba(255,255,255,0.75); font-size: 0.875rem;
              transition: background-color 0.15s ease, color 0.15s ease;
          }

          .submenu li a:hover { background-color: #1e2a40; color: #ffffff; }

          .contenedor-busqueda { background-color: rgba(18, 24, 41, 0.45); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px !important; backdrop-filter: blur(4px); }
          .contenedor-busqueda .form-control:focus { box-shadow: none; color: #ffffff; }
          .contenedor-busqueda .input-group-text, .contenedor-busqueda .form-control { border-radius: 14px !important; }
          .placeholder-personalizado::placeholder { color: rgba(255, 255, 255, 0.5) !important; opacity: 1; }

          .titulo-pagina { color: #1a2340; }
          .subtitulo-pagina { color: #4a5568; }

          .tarjeta-watchlist {
              background-color: #1e2a40;
              border-radius: 16px;
              overflow: hidden;
              color: white;
              box-shadow: 0 8px 24px rgba(0,0,0,0.25);
              height: 100%;
              display: flex;
              flex-direction: column;
          }
          .tarjeta-watchlist img { width: 100%; height: 280px; object-fit: cover; }
          .tarjeta-watchlist .info { padding: 16px; display: flex; flex-direction: column; flex-grow: 1; }
          .tarjeta-watchlist .info .titulo { font-weight: bold; font-size: 1rem; margin-bottom: 4px; }
          .tarjeta-watchlist .info .meta { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 14px; }

          .badge-pendiente {
              align-self: flex-start;
              background-color: #f59e0b;
              color: #1a2340;
              font-size: 0.7rem;
              font-weight: 700;
              padding: 3px 10px;
              border-radius: 50px;
              margin-bottom: 8px;
              text-transform: uppercase;
          }

          .btn-visto {
              margin-top: auto;
              background-color: #10b981;
              color: white; border: none; border-radius: 10px;
              padding: 9px; font-size: 0.9rem; font-weight: 600;
              cursor: pointer; transition: background-color 0.2s;
              display: flex; align-items: center; justify-content: center; gap: 6px;
          }
          .btn-visto:hover { background-color: #059669; }

          #estado-vacio { display: none; }
          #estado-carga { color: #4a5568; }

          footer {
              background-color: #1a2340; color: #e2e8f0;
              text-align: center; padding: 10px; font-size: 0.85rem;
              position: fixed; bottom: 0; width: 100%;
          }
      </style>
  </head>

  <body>
      <div id="header-container"></div>

      <div class="container my-5" style="padding-bottom: 70px;">
          <h2 class="titulo-pagina mb-1"><i class="bi bi-clock-history me-2"></i>Mi Watchlist</h2>
          <p class="subtitulo-pagina mb-4">Películas que tienes pendientes de ver.</p>

          <div class="mx-auto mb-4" style="max-width:500px;">
              <div class="input-group contenedor-busqueda shadow-sm">
                  <span class="input-group-text bg-transparent border-0 text-white-50 ps-3">
                      <i class="bi bi-search fs-5"></i>
                  </span>
                  <input type="text" id="input-busqueda-pelicula"
                      class="form-control bg-transparent border-0 text-white placeholder-personalizado py-2"
                      placeholder="Buscar películas" autocomplete="off">
              </div>
          </div>

          <div id="estado-carga" class="text-center py-5">
              <div class="spinner-border" role="status"></div>
              <p class="mt-3">Cargando pendientes...</p>
          </div>

          <div id="grid-watchlist" class="row row-cols-1 row-cols-md-4 g-4"></div>

          <div id="estado-vacio" class="text-center py-5">
              <i class="bi bi-check2-circle" style="font-size: 3.5rem; color: #10b981;"></i>
              <p class="mt-3 subtitulo-pagina fs-5" id="estado-vacio-texto">¡No tienes películas pendientes! Las has visto todas.</p>
              <a href="../index.html" class="btn btn-primary mt-2" id="estado-vacio-btn">Volver al inicio</a>
          </div>
      </div>

      <footer>
          <strong>AyesaFlix 2026 &copy; Todos los derechos reservados</strong>
      </footer>

      <script src="../js - bootstrap/bootstrap.bundle.min.js"></script>
      <script>
          const API = 'http://localhost:8080/api';

          let watchlist = [];   // lista completa en memoria (para filtrar sin volver a pedir al backend)

          function escapeHtml(text) {
              const div = document.createElement('div');
              div.appendChild(document.createTextNode(text ?? ''));
              return div.innerHTML;
          }

          // Carga TODAS las páginas de películas pendientes (vista=false).
          // El backend pagina de 4 en 4, así que recorremos todas las páginas.
          async function cargarWatchlist() {
              const res0 = await fetch(`${API}/peliculas?vista=false`);
              if (!res0.ok) { mostrarError(); return; }
              const data0 = await res0.json();

              let todas = [...(data0.content ?? data0)];
              const totalPages = data0.totalPages ?? 1;
              if (totalPages > 1) {
                  const paginas = await Promise.all(
                      Array.from({ length: totalPages - 1 }, (_, i) =>
                          fetch(`${API}/peliculas?vista=false&page=${i + 1}`).then(r => r.json())
                      )
                  );
                  paginas.forEach(d => { todas = todas.concat(d.content ?? []); });
              }

              document.getElementById('estado-carga').style.display = 'none';
              watchlist = todas;
              renderizar(watchlist);
          }

          function filtrarWatchlist() {
              const texto = document.getElementById('input-busqueda-pelicula').value.toLowerCase().trim();
              renderizar(watchlist.filter(p => (p.titulo ?? '').toLowerCase().includes(texto)));
          }

          function renderizar(pelis) {
              const grid = document.getElementById('grid-watchlist');
              const vacio = document.getElementById('estado-vacio');
              const vacioTexto = document.getElementById('estado-vacio-texto');
              const vacioBtn = document.getElementById('estado-vacio-btn');

              if (!pelis.length) {
                  grid.innerHTML = '';
                  // Distingue "no hay pendientes" de "sin resultados de búsqueda"
                  if (watchlist.length) {
                      vacioTexto.textContent = 'No hay pendientes que coincidan con tu búsqueda.';
                      vacioBtn.style.display = 'none';
                  } else {
                      vacioTexto.textContent = '¡No tienes películas pendientes! Las has visto todas.';
                      vacioBtn.style.display = '';
                  }
                  vacio.style.display = 'block';
                  return;
              }

              vacio.style.display = 'none';
              grid.innerHTML = pelis.map(p => `
                  <div class="col">
                      <div class="tarjeta-watchlist">
                          <img src="${escapeHtml(p.urlPortada ?? 'https://picsum.photos/300/400')}" alt="${escapeHtml(p.titulo)}">
                          <div class="info">
                              <span class="badge-pendiente"><i class="bi bi-hourglass-split"></i> Pendiente</span>
                              <div class="titulo">${escapeHtml(p.titulo)}</div>
                              <div class="meta">${p.anio ?? '—'} • ${escapeHtml(p.genero?.nombre ?? '—')}</div>
                              <button class="btn-visto" onclick="marcarComoVista(${p.id}, this.closest('.col'))">
                                  <i class="bi bi-eye-fill"></i> Ya la he visto
                              </button>
                          </div>
                      </div>
                  </div>`).join('');
          }

          // PATCH /api/peliculas/{id}/vista → alterna vista a true (vista),
          // luego saca la tarjeta de la Watchlist con una animación suave.
          async function marcarComoVista(id, colEl) {
              const res = await fetch(`${API}/peliculas/${id}/vista`, { method: 'PATCH' });

              if (!res.ok) {
                  alert('No se pudo marcar como vista.');
                  return;
              }

              // Quita la peli de la lista en memoria para que el filtro siga siendo coherente
              watchlist = watchlist.filter(p => p.id !== id);
              colEl.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
              colEl.style.opacity = '0';
              colEl.style.transform = 'scale(0.92)';
              setTimeout(() => {
                  colEl.remove();
                  if (!document.querySelectorAll('#grid-watchlist .col').length) {
                      filtrarWatchlist();
                  }
              }, 400);
          }

          function mostrarError() {
              document.getElementById('estado-carga').innerHTML =
                  '<p class="text-danger">No se pudieron cargar las películas. ¿Está arrancado el backend?</p>';
          }

          document.getElementById('input-busqueda-pelicula').addEventListener('input', filtrarWatchlist);

          cargarWatchlist();

          fetch('/peliculas/layout.html')
                  .then(response => response.text())
                  .then(data => {
                          document.getElementById('header-container').innerHTML = data;
                  })
                  .catch(error => console.error('Error al cargar la cabecera:', error));
      </script>
  </body>

  </html>
